<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chill Mono OS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0a;
      --text: #F4F3EE;
      --text-muted: rgba(244, 243, 238, 0.5);
      --border: rgba(244, 243, 238, 0.3);
      --error: #a32a2a;
      --success: #2C5A3B;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* 复古印刷噪点质感背景 */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: -1;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      padding: 40px 24px;
      z-index: 1;
    }

    /* 头部排版 */
    .header {
      margin-bottom: 48px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      line-height: 0.95;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .title .italic {
      font-style: italic;
      padding-left: 10%;
      display: block;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(244, 243, 238, 0.8);
      padding-left: 2px;
      max-width: 90%;
    }

    .subtitle strong {
      color: var(--text);
      font-weight: 500;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 16px;
    }

    /* 表单区域 */
    .form-group {
      margin-bottom: 32px;
      position: relative;
    }

    .form-group label {
      display: flex;
      align-items: baseline;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    /* 英文装饰标签 */
    .form-group label .en-deco {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-left: 8px;
      font-weight: 400;
    }

    .form-group input {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 16px;
      border-radius: 0;
      transition: all 0.3s;
      font-family: 'Space Mono', monospace; /* 输入内容用等宽字体更有极客感 */
    }

    .form-group input:focus {
      outline: none;
      border-bottom-color: var(--text);
    }

    .form-group input::placeholder {
      color: rgba(244, 243, 238, 0.2);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
    }

    /* 按钮 */
    .btn {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--text);
      background: var(--text);
      color: var(--bg);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      margin-top: 16px;
    }

    .btn:hover:not(:disabled) {
      background: transparent;
      color: var(--text);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: transparent;
      color: var(--text);
    }

    /* 底部切换链接 */
    .switch {
      text-align: center;
      margin-top: 40px;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .switch a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.3s;
      padding-bottom: 2px;
      cursor: pointer;
    }

    .switch a:hover {
      border-bottom-color: var(--text);
    }

    .switch .divider {
      margin: 0 12px;
      color: rgba(244, 243, 238, 0.2);
    }

    /* 消息提示 */
    .msg {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 12px;
      margin-bottom: 24px;
      display: none;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .msg.error {
      display: block;
      color: var(--error);
      border: 1px solid var(--error);
      background: rgba(163, 42, 42, 0.1);
    }

    .msg.success {
      display: block;
      color: var(--text);
      border: 1px solid var(--text);
      background: rgba(244, 243, 238, 0.05);
    }

    /* 页面切换逻辑类 */
    .hidden { display: none !important; }
    
    /* 页面进入动画 */
    #page-login, #page-register {
      animation: fadeIn 0.6s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ================= 登录页面 ================= -->
  <div id="page-login" class="wrap">
    <header class="header">
      <h1 class="title">The<br><span class="italic">Gate</span></h1>
      <p class="subtitle">欢迎回到 <strong>Chill Mono OS</strong>。</p>
    </header>

    <div>
      <div id="login-msg" class="msg"></div>

      <div class="form-group">
        <label>邮箱 <span class="en-deco">/ EMAIL</span></label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>密码 <span class="en-deco">/ PASSWORD</span></label>
        <input type="password" id="login-password" placeholder="请输入密码">
      </div>

      <button class="btn" id="login-btn">登录</button>

      <div class="switch">
        没有账号？<a id="to-register">注册</a>
        <span class="divider">|</span>
        <a href="claim.html">领取邀请码</a>
      </div>
    </div>
  </div>

  <!-- ================= 注册页面 ================= -->
  <div id="page-register" class="wrap hidden">
    <header class="header">
      <h1 class="title">New<br><span class="italic">Soul</span></h1>
      <p class="subtitle">加入 <strong>Chill Mono OS</strong>，需要邀请码。</p>
    </header>

    <div>
      <div id="register-msg" class="msg"></div>

      <div class="form-group">
        <label>邀请码 <span class="en-deco">/ INVITE CODE</span></label>
        <input type="text" id="register-code" placeholder="INVITE-XXX">
      </div>
      <div class="form-group">
        <label>邮箱 <span class="en-deco">/ EMAIL</span></label>
        <input type="email" id="register-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>密码 <span class="en-deco">/ PASSWORD</span></label>
        <input type="password" id="register-password" placeholder="至少 6 位">
      </div>

      <button class="btn" id="register-btn">注册</button>

      <div class="switch">
        已有账号？<a id="to-login">去登录</a>
      </div>
    </div>
  </div>


  <script>
    // =============================================
    // ⚠️ 换成你自己的 Supabase 项目信息
    // Settings → API 里找
    // =============================================
    const SUPABASE_URL      = 'https://kjtvtyfibkklwsievlgt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqdHZ0eWZpYmtrbHdzaWV2bGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE4MjgsImV4cCI6MjA5Mzc0NzgyOH0.jXFV79-PHPbu14C9LwmrNlL4cIw0HLnTc67svJC3ovA';

    // --- 工具函数（最先定义，不依赖任何外部状态）---
    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text;
      el.className = 'msg ' + type;
    }
    function clearMsg(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = 'msg';
      el.textContent = '';
    }
    function enterApp() {
      window.location.replace('index.html');
    }

    // --- Supabase 懒初始化，用时再拿 ---
    let _sb = null;
    function getSB(msgId) {
      if (_sb) return _sb;
      try {
        _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        return _sb;
      } catch(e) {
        console.warn('[login] Supabase 初始化失败', e);
        if (msgId) showMsg(msgId, '⚠️ Supabase 配置有误，请检查 URL 和 Key', 'error');
        return null;
      }
    }

    // --- 页面切换（纯 DOM，零依赖）---
    document.addEventListener('DOMContentLoaded', () => {
      const pageLogin    = document.getElementById('page-login');
      const pageRegister = document.getElementById('page-register');

      document.getElementById('to-register').addEventListener('click', () => {
        pageLogin.classList.add('hidden');
        pageRegister.classList.remove('hidden');
      });
      document.getElementById('to-login').addEventListener('click', () => {
        pageRegister.classList.add('hidden');
        pageLogin.classList.remove('hidden');
      });

      // --- 注册 ---
      document.getElementById('register-btn').addEventListener('click', async () => {
        clearMsg('register-msg');
        const sb = getSB('register-msg');
        if (!sb) return;

        const code     = document.getElementById('register-code').value.trim();
        const email    = document.getElementById('register-email').value.trim();
        const password = document.getElementById('register-password').value;
        const btn      = document.getElementById('register-btn');

        if (!code || !email || !password) return showMsg('register-msg', '请填写所有字段', 'error');
        if (password.length < 6) return showMsg('register-msg', '密码至少6位', 'error');

        btn.disabled = true;
        btn.textContent = '注册中...';
        try {
          // 第一步：检查邀请码
          const { data: codeData, error: codeError } = await sb
            .from('invitation_codes')
            .select('id, current_uses, max_uses')
            .eq('code', code)
            .single();

          if (codeError || !codeData) return showMsg('register-msg', '邀请码无效', 'error');
          if (codeData.current_uses >= codeData.max_uses) return showMsg('register-msg', '该邀请码已用完', 'error');

          // 第二步：创建账号
          const { error: authError } = await sb.auth.signUp({ email, password });
          if (authError) {
            if (authError.message.includes('already registered')) return showMsg('register-msg', '该邮箱已被注册', 'error');
            return showMsg('register-msg', '注册失败：' + authError.message, 'error');
          }

          // 第三步：扣减邀请码（原子操作，防并发）
          const { data: redeemed } = await sb.rpc('redeem_invite_code', { code_input: code });
          if (!redeemed) return showMsg('register-msg', '邀请码刚好用完了，请联系管理员', 'error');

          showMsg('register-msg', '注册成功，正在进入...', 'success');
          setTimeout(enterApp, 800);
        } catch (err) {
          showMsg('register-msg', '网络错误，请重试', 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = '注册';
        }
      });

      // --- 登录 ---
      document.getElementById('login-btn').addEventListener('click', async () => {
        clearMsg('login-msg');
        const sb = getSB('login-msg');
        if (!sb) return;

        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn      = document.getElementById('login-btn');

        if (!email || !password) return showMsg('login-msg', '请填写邮箱和密码', 'error');

        btn.disabled = true;
        btn.textContent = '登录中...';
        try {
          const { error } = await sb.auth.signInWithPassword({ email, password });
          if (error) return showMsg('login-msg', '邮箱或密码错误', 'error');
          enterApp();
        } catch (err) {
          showMsg('login-msg', '网络错误，请重试', 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = '登录';
        }
      });

      // --- 页面加载：已登录直接进 ---
      (async () => {
        const sb = getSB();
        if (!sb) return;
        try {
          const { data: { session } } = await sb.auth.getSession();
          if (session) enterApp();
        } catch(e) {}
      })();
    });
  </script>
</body>
</html>
