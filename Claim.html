<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>领取邀请码 · Chill Mono OS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f3ef;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #8a8a8a;
      --accent: #1a1a1a;
      --border: #e0ddd8;
      --code-bg: #f0ede8;
      --code-text: #3d5a80;
      --error-bg: #fdf0ef;
      --error: #c1574e;
      --error-border: #f0d0cd;
      --success-bg: #eef5f0;
      --success: #5a8a6a;
      --success-border: #c8dec8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 360px;
      padding: 24px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 32px 36px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
      font-family: 'Space Mono', monospace;
      letter-spacing: -0.02em;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--muted);
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-group input::placeholder { color: #c8c5c0; }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 10px;
      background: var(--accent);
      color: #fff;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .msg {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }

    .msg.error {
      display: block;
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid var(--error-border);
    }

    .msg.success {
      display: block;
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid var(--success-border);
    }

    /* 领码结果卡片 */
    .result-box {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: var(--code-bg);
      border-radius: 8px;
      text-align: center;
    }

    .result-box.show { display: block; }

    .result-box .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      font-family: 'Space Mono', monospace;
    }

    .result-box .code {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--code-text);
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .switch {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .switch a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">Chill Mono OS</div>
      <div class="subtitle">领取你的邀请码</div>

      <div id="msg" class="msg"></div>

      <div class="form-group">
        <label>QQ 号</label>
        <input type="text" id="qq-input" placeholder="请输入你的 QQ 号" inputmode="numeric">
      </div>

      <button class="btn" id="claim-btn">领取邀请码</button>

      <!-- 领码成功后显示 -->
      <div class="result-box" id="result-box">
        <div class="label">你的邀请码</div>
        <div class="code" id="result-code"></div>
        <button class="copy-btn" id="copy-btn">复制</button>
      </div>

      <div class="switch">
        <a href="login.html">返回登录</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL      = 'https://kjtvtyfibkklwsievlgt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqdHZ0eWZpYmtrbHdzaWV2bGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE4MjgsImV4cCI6MjA5Mzc0NzgyOH0.jXFV79-PHPbu14C9LwmrNlL4cIw0HLnTc67svJC3ovA';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    function clearMsg() {
      const el = document.getElementById('msg');
      el.className = 'msg';
      el.textContent = '';
    }

    function showResult(code) {
      document.getElementById('result-code').textContent = code;
      document.getElementById('result-box').classList.add('show');
    }

    // 复制按钮
    document.getElementById('copy-btn').addEventListener('click', () => {
      const code = document.getElementById('result-code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => btn.textContent = '复制', 1500);
      });
    });

    // 领码
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('claim-btn').addEventListener('click', async () => {
        clearMsg();
        const qq  = document.getElementById('qq-input').value.trim();
        const btn = document.getElementById('claim-btn');

        if (!qq) return showMsg('请输入 QQ 号', 'error');
        if (!/^\d{5,12}$/.test(qq)) return showMsg('QQ 号格式不对', 'error');

        btn.disabled = true;
        btn.textContent = '领取中...';

        try {
          const { data: code, error } = await sb.rpc('claim_code_for_qq', { qq_input: qq });

          if (error) {
            console.error(error);
            return showMsg('领取失败，请稍后重试', 'error');
          }

          if (!code) {
            return showMsg('邀请码已发完，请联系管理员', 'error');
          }

          // 已领过或新领取，都显示码
          showResult(code);
          btn.textContent = '已领取';

        } catch (err) {
          showMsg('网络错误，请重试', 'error');
          btn.disabled = false;
          btn.textContent = '领取邀请码';
        }
      });
    });
  </script>
</body>
</html>
