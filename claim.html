<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>领取邀请码 · Chill Mono OS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Caveat:wght@600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0a;
      --text: #F4F3EE;
      --tarot-bg: #F4F3EE;
      --tarot-ink: #0a0a0a;
      --error: #a32a2a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* 巧思 1：复古印刷噪点质感背景 (纯CSS实现) */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: -1;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      padding: 40px 24px;
      z-index: 1;
    }

    /* 头部排版：致敬参考图的 Editorial 风格 */
    .header {
      margin-bottom: 48px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      line-height: 0.95;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .title .italic {
      font-style: italic;
      padding-left: 10%;
      display: block;
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(244, 243, 238, 0.7);
      padding-left: 2px;
      max-width: 80%;
    }

    .subtitle strong {
      color: var(--text);
      font-weight: 500;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 16px;
    }

    /* 表单区域 */
    .form-group {
      margin-bottom: 32px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 8px;
      color: rgba(244, 243, 238, 0.5);
    }

    .form-group input {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-bottom: 1px solid rgba(244, 243, 238, 0.3);
      background: transparent;
      color: var(--text);
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      border-radius: 0;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-bottom-color: var(--text);
    }

    .form-group input::placeholder {
      color: rgba(244, 243, 238, 0.2);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--text);
      background: var(--text);
      color: var(--bg);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .btn:hover:not(:disabled) {
      background: transparent;
      color: var(--text);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: transparent;
      color: var(--text);
    }

    .msg {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 12px;
      margin-bottom: 24px;
      display: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
    }

    .msg.error {
      display: block;
      color: var(--error);
      border: 1px solid var(--error);
    }

    .msg.success {
      display: block;
      color: var(--text);
      border: 1px solid var(--text);
    }

    /* 巧思 2：塔罗牌风格的结果框 */
    .result-box {
      display: none;
      margin-top: 48px;
      background: var(--tarot-bg);
      color: var(--tarot-ink);
      padding: 24px;
      border-radius: 8px; /* 微小的圆角模仿纸牌 */
      position: relative;
      text-align: center;
      /* 塔罗牌质感阴影 */
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.05);
      /* 翻牌动画准备 */
      transform-origin: center;
      transform: perspective(1000px) rotateY(90deg);
      opacity: 0;
    }

    /* 翻牌动画 */
    .result-box.show {
      display: block;
      animation: flipCard 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes flipCard {
      100% { transform: perspective(1000px) rotateY(0deg); opacity: 1; }
    }

    /* 塔罗牌内边框 */
    .result-box::before {
      content: '';
      position: absolute;
      top: 10px; bottom: 10px; left: 10px; right: 10px;
      border: 1.5px solid var(--tarot-ink);
      border-radius: 4px;
      pointer-events: none;
    }

    /* 塔罗牌顶部元素 (星星和罗马数字) */
    .tarot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      font-family: 'Playfair Display', serif;
      margin-bottom: 32px;
      margin-top: 8px;
    }
    
    .tarot-header .star { font-size: 14px; }
    .tarot-header .num { font-size: 16px; letter-spacing: 0.1em; }

    .result-box .label {
      display: none; /* 隐藏原有的 label，用塔罗牌排版替代 */
    }

    /* 牌面中心的邀请码 */
    .result-box .code {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.15em;
      margin: 20px 0;
      position: relative;
      z-index: 2;
    }

    /* 塔罗牌底部命名 (手写体/斜体) */
    .tarot-footer {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px;
      margin-top: 32px;
      margin-bottom: 8px;
    }

    /* 悬浮复印按钮 (模仿印章) */
    .copy-btn {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--text);
      padding: 6px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--text);
      color: var(--bg);
    }

    /* 底部返回链接，去掉抽象手写体，改为优雅中英混排 */
    .switch {
      text-align: right;
      margin-top: 64px;
    }

    .switch a {
      font-family: 'Playfair Display', "DM Sans", sans-serif;
      font-style: italic;
      font-size: 14px;
      color: rgba(244, 243, 238, 0.5);
      text-decoration: none;
      transition: color 0.3s;
    }

    .switch a:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="wrap">
    
    <!-- 融入参考图文案排版 -->
    <header class="header">
      <h1 class="title">You're<br><span class="italic">Invited!</span></h1>
      <p class="subtitle">to join <strong>Chill Mono OS</strong>, despite all of the chaos.</p>
    </header>

    <div>
      <div id="msg" class="msg"></div>

      <div class="form-group">
        <label>Your QQ Identifier</label>
        <input type="text" id="qq-input" placeholder="请输入 QQ 号" inputmode="numeric">
      </div>

      <button class="btn" id="claim-btn">Reveal Your Fate</button>

      <!-- 领码成功后显示：塔罗牌设计 -->
      <div class="result-box" id="result-box">
        <div class="tarot-header">
          <span class="star">★</span>
          <span class="num">I</span>
          <span class="star">★</span>
        </div>
        
        <div class="label">你的邀请码</div>
        <div class="code" id="result-code"></div>
        
        <div class="tarot-footer">L'Invitation</div>
        
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>

      <div class="switch">
        <a href="login.html">返回登录 / Back to login ⤣</a>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL      = 'https://kjtvtyfibkklwsievlgt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqdHZ0eWZpYmtrbHdzaWV2bGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE4MjgsImV4cCI6MjA5Mzc0NzgyOH0.jXFV79-PHPbu14C9LwmrNlL4cIw0HLnTc67svJC3ovA';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    function clearMsg() {
      const el = document.getElementById('msg');
      el.className = 'msg';
      el.textContent = '';
    }

    function showResult(code) {
      document.getElementById('result-code').textContent = code;
      document.getElementById('result-box').classList.add('show');
    }

    // 复制按钮
    document.getElementById('copy-btn').addEventListener('click', () => {
      const code = document.getElementById('result-code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'COPIED ✓';
        setTimeout(() => btn.textContent = 'COPY', 1500);
      });
    });

    // 领码
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('claim-btn').addEventListener('click', async () => {
        clearMsg();
        const qq  = document.getElementById('qq-input').value.trim();
        const btn = document.getElementById('claim-btn');

        if (!qq) return showMsg('请输入 QQ 号', 'error');
        if (!/^\d{5,12}$/.test(qq)) return showMsg('QQ 号格式不对', 'error');

        btn.disabled = true;
        btn.textContent = 'Drawing...';

        try {
          const { data: code, error } = await sb.rpc('claim_code_for_qq', { qq_input: qq });

          if (error) {
            console.error(error);
            return showMsg('领取失败，请稍后重试', 'error');
          }

          if (!code) {
            return showMsg('邀请码已发完，请联系管理员', 'error');
          }

          // 已领过或新领取，都显示码
          showResult(code);
          btn.textContent = 'Destiny Revealed';

        } catch (err) {
          showMsg('网络错误，请重试', 'error');
          btn.disabled = false;
          btn.textContent = 'Reveal Your Fate';
        }
      });
    });
  </script>
</body>
</html>
